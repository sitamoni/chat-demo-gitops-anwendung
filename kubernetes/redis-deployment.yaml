---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: techcast-demo
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - name: redis
              containerPort: 6379