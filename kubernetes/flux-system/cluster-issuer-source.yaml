apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-issuer
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure #
  interval: 10m
  path: ./kubernetes/infrastructure/issuer # Pfad zu deiner ClusterIssuer-YAML
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system