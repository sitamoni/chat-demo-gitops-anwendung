apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 20m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.15.1"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 30m
  install:
    remediation:
      retries: -1
    createNamespace: true
  targetNamespace: ingress-nginx
  upgrade:
    remediation:
      retries: -1
  values:
    controller:
      service:
        type: LoadBalancer
        loadBalancerIP: "51.158.129.183"
        annotations:
          service.beta.kubernetes.io/scw-loadbalancer-proxy-protocol-v2: "true"
          service.beta.kubernetes.io/scw-loadbalancer-use-hostname: "true"
      config:
        use-proxy-protocol: "true"
        use-forwarded-headers: "true"
        compute-full-forwarded-for: "true"
      replicaCount: 2
      resources:
        requests:
          cpu: "50m"
          memory: "150Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"