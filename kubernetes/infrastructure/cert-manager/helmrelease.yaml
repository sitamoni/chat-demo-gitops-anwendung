apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 20m
  chart:
    spec:
      chart: cert-manager
      version: "1.20.2"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 30m
  install:
    createNamespace: true
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  targetNamespace: cert-manager
  values:
    installCRDs: true
    replicaCount: 2