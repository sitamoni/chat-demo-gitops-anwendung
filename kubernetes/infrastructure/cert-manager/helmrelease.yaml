apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 20m
  chart:
    spec:
      chart: cert-manager
      version: "1.20.2"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 30m
  install:
    createNamespace: true
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  targetNamespace: cert-manager
  values:
    installCRDs: true
    replicaCount: 2
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
    webhook:
      resources:
        requests:
          cpu: "10m"
          memory: "40Mi"
        limits:
          cpu: "60m"
          memory: "64Mi"
    cainjector:
      resources:
        requests:
          cpu: "10m"
          memory: "40Mi"
        limits:
          cpu: "60m"
          memory: "64Mi"