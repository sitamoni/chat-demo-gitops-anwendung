apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 20m
  chart:
    spec:
      chart: cert-manager
      version: "1.20.2"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  targetNamespace: cert-manager
  values:
    crds:
      enabled: true
      keep: true
    replicaCount: 2