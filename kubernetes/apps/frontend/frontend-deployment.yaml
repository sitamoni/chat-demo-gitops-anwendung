---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: techcast-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/sitamoni/chat-frontend:v1
          env:
            - name: REDIS_URL
              value: redis://redis:6379
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"